<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/css/index.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alvoplay - Ao vivo</title>
</head>

<body>
    <header>
        <div class="header">
            <img src="/assets/LOGOTIPO2.png" alt="Radio Alvoplay" class="logo">
        </div>
        <div class="play-now">
            <button class="play-button">Ouvir agora</button>
        </div>
    </header>

<div class="grid-banner">
    <div class="banner">
        <div class="carousel">
            <div class="carousel-track">
                <div class="carousel-slide active" style="background-color: #e10600;">
                    <p class="slide-placeholder">Banner 1</p>
                </div>
                <div class="carousel-slide" style="background-color: #ff6a00;">
                    <p class="slide-placeholder">Banner 2</p>
                </div>
                <div class="carousel-slide" style="background-color: #3a1a00;">
                    <p class="slide-placeholder">Banner 3</p>
                </div>
            </div>
            <div class="carousel-dots">
                <span class="dot active"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        </div>
    </div>
</div>








    <footer>
        <div class="playing-now">
            <img src="/assets/Disco.png" alt="Disco Rodando" class="disco">
            <div class="song-info">
                <p class="song-title">That's What I Like</p>
            </div>
            <div class="play-title">
                <p class="playing-title">Tocando agora</p>
            </div>
        </div>
    </footer>

    <script src="/js/carousel.js"></script>
</body>

</html>
